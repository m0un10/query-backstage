name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Test
        id: npm-ci-test
        run: npm run ci-test

  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Test Local Action (no-auth query against demo.backstage.io)
        id: test-action
        uses: ./
        with:
          backstage_base_url: https://demo.backstage.io
          auth_mode: none
          kind: Component
          max_entities: 5

      - name: Print Outputs
        id: output
        run: |
          echo "count=${{ steps.test-action.outputs.count }}"
          echo "has_results=${{ steps.test-action.outputs.has_results }}"
          echo "entity_refs=${{ steps.test-action.outputs.entity_refs_json }}"
