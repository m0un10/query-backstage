# Demonstrates rendering links to related tools, docs, and dashboards by
# reading a component's `metadata.annotations` and `metadata.links` from the
# Backstage catalog and writing them to the job summary.
name: Example – Surface Related Tool Links

on:
  workflow_dispatch:
    inputs:
      component:
        description: Component to surface links for
        required: true
        default: petstore

permissions:
  contents: read

jobs:
  related-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pull annotations and links from catalog
        id: lookup
        uses: ./
        with:
          backstage_base_url: https://demo.backstage.io
          auth_mode: none
          kind: Component
          name: ${{ inputs.component }}
          fields: metadata.name,metadata.namespace,metadata.annotations,metadata.links
          fail_on_empty: 'true'

      - name: Render related links to job summary
        env:
          ENTITY: ${{ steps.lookup.outputs.first_entity_json }}
          BASE_URL: https://demo.backstage.io
          COMPONENT: ${{ inputs.component }}
        run: |
          NS=$(printf '%s' "$ENTITY" | jq -r '.metadata.namespace // "default"')
          ANN=$(printf '%s' "$ENTITY" | jq -c '.metadata.annotations // {}')

          SOURCE=$(printf '%s' "$ANN"  | jq -r '."backstage.io/source-location" // empty' | sed 's|^url:||')
          VIEW=$(printf '%s' "$ANN"    | jq -r '."backstage.io/view-url"        // empty')
          GH_SLUG=$(printf '%s' "$ANN" | jq -r '."github.com/project-slug"      // empty')
          PAGERDUTY=$(printf '%s' "$ANN" | jq -r '."pagerduty.com/integration-key" // empty')

          {
            echo "## 🔗 Related links for \`$COMPONENT\`"
            echo ""
            echo "- 🏛️ [Backstage entity]($BASE_URL/catalog/$NS/component/$COMPONENT)"
            [ -n "$SOURCE" ]    && echo "- 📦 [Source]($SOURCE)"
            [ -n "$VIEW" ]      && echo "- 👁️ [View definition]($VIEW)"
            [ -n "$GH_SLUG" ]   && echo "- 🐙 [GitHub repo](https://github.com/$GH_SLUG)"
            [ -n "$PAGERDUTY" ] && echo "- 🚨 PagerDuty integration configured"

            # Render any custom links declared on the entity.
            printf '%s' "$ENTITY" | jq -r '
              (.metadata.links // [])[]
              | "- 🔗 [\(.title // .url)](\(.url))"
            '
          } >> "$GITHUB_STEP_SUMMARY"
